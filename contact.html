<body>

        <div class="navbar-container">

                <span class="bar"></span>

            <ul class="navbar-menue">

            </ul>
        </div>
    </nav>

    <section class="mainbox container d-flex align-items-center">
        <div class="row w-100 p-4">
            <div class="col-md-5 contact-info">
                <h2>Let's Connect</h2>
                <p>Have a project in mind or just want to say hi? Feel free to reach out!</p>
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <span>contact-prasil@gmail.com</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-phone"></i>
                    <span>+123 456 7890</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-location-dot"></i>
                    <span>Kathmandu, Nepal</span>
                </div>
            </div>

            <div class="col-md-7">
                <form class="contact-form">
                    <div class="mb-3">
                        <input type="text" class="form-control bg-transparent text-white" placeholder="Full Name"
                            required>
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control bg-transparent text-white" placeholder="Email Address"
                            required>
                    </div>
                    <div class="mb-3">
                        <textarea class="form-control bg-transparent text-white" rows="4" placeholder="Your Message"
                            required></textarea>
                    </div>
                    <button type="submit" class="summit">
                        <i class="fa-solid fa-paper-plane ms-2"></i>
                        <span>Send Message</span>
                    </button>
                </form>
            </div>
        </div>
    </section>
